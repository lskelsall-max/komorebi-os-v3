<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Komorebi OS">
<meta name="theme-color" content="#080806">
<title>Komorebi OS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080806;
  --s1:     #0d0d0a;
  --s2:     #111110;
  --border: #1c1c18;
  --borderM:#2a2a25;
  --text:   #e4e0d4;
  --muted:  #706c65;
  --dim:    #3a3a35;
  --gold:   #c8a455;
  --ember:  #b06030;
  --sage:   #5a7858;
  --goldF:  rgba(200,164,85,0.08);
  --emberF: rgba(176,96,48,0.08);
  --sageF:  rgba(90,120,88,0.08);
  --purple: #9B8EC4;
  --purpleF:rgba(155,142,196,0.10);
  --sf: 'Cormorant Garamond', serif;
  --mn: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  background:var(--bg);color:var(--text);
  font-family:var(--mn);
  min-height:100vh;min-height:-webkit-fill-available;
  overscroll-behavior:none;
}

.app{
  max-width:430px;margin:0 auto;
  padding:max(env(safe-area-inset-top),28px) 0 max(env(safe-area-inset-bottom),48px);
}

/* ── HEADER ── */
.header{padding:0 24px 24px;}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;}
.header-date{
  font-family:var(--sf);font-size:38px;font-weight:300;
  letter-spacing:-0.01em;line-height:1;
  transition:color 1s;
}
.header-day{
  font-family:var(--mn);font-size:8px;letter-spacing:0.2em;
  color:var(--muted);text-transform:uppercase;margin-top:7px;
}
.clock{
  font-family:var(--mn);font-size:11px;color:var(--dim);
  letter-spacing:0.06em;padding-top:6px;text-align:right;
}
.phase{
  font-family:var(--mn);font-size:7px;letter-spacing:0.25em;
  text-transform:uppercase;color:var(--dim);margin-top:5px;text-align:right;
  transition:color 1s;
}

/* Dawn / dusk / night tints */
body.ph-dawn  .header-date,body.ph-dawn  .phase{color:var(--gold);}
body.ph-dusk  .header-date,body.ph-dusk  .phase{color:var(--ember);}
body.ph-night .header-date,body.ph-night .phase{color:var(--purple);}

/* ── DAY PROGRESS HAIRLINE ── */
.day-line{height:1px;background:var(--border);position:relative;overflow:hidden;}
.day-line-fill{
  position:absolute;left:0;top:0;height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold),var(--ember));
  transition:width 0.4s ease;
}

/* ── PILLAR ── */
.track{padding:26px 24px 18px;border-bottom:1px solid var(--border);transition:opacity 0.6s;}
.track:last-of-type{border-bottom:none;}
.track-label{
  font-family:var(--mn);font-size:8px;letter-spacing:0.22em;
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:12px;
}
.track-label::after{content:'';flex:1;height:1px;background:var(--border);}
.track-count{font-family:var(--mn);font-size:8px;letter-spacing:0.1em;color:var(--dim);}
.track-now{
  font-size:7px;letter-spacing:0.2em;color:inherit;
  border:1px solid currentColor;border-radius:1px;padding:2px 7px;opacity:0.85;
}
.track.complete{opacity:0.55;}

/* ── MANTRA ── */
.mantra{
  padding:34px 24px 4px;text-align:center;
  font-family:var(--mn);font-size:8px;letter-spacing:0.22em;
  color:var(--dim);text-transform:uppercase;transition:color 0.8s;
}
.mantra.lit{color:var(--gold);}

/* ── CHECKLIST ── */
.check-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.check-item:last-child{border-bottom:none;}
.check-item:active{opacity:0.55;}

.check-box{
  width:20px;height:20px;flex-shrink:0;margin-top:2px;
  border:1px solid var(--borderM);border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.check-box.on-gold{background:var(--gold);border-color:var(--gold);}
.check-box.on-ember{background:var(--ember);border-color:var(--ember);}
.check-box.on-sage{background:var(--sage);border-color:var(--sage);}
.check-box.on-purple{background:var(--purple);border-color:var(--purple);}
.check-tick{font-size:10px;color:var(--bg);font-weight:700;opacity:0;transition:opacity 0.15s;}
.check-box.on-gold .check-tick,
.check-box.on-ember .check-tick,
.check-box.on-sage .check-tick,
.check-box.on-purple .check-tick{opacity:1;}

.check-text{
  font-family:var(--sf);font-size:17px;font-weight:300;
  color:var(--text);line-height:1.25;transition:color 0.2s;flex:1;
}
.check-sub{
  font-family:var(--mn);font-size:9px;color:var(--muted);
  letter-spacing:0.06em;margin-top:3px;
}
.check-item.done .check-text{color:var(--dim);}
.check-item.done .check-sub{color:var(--dim);}

/* ── VIEW BTN ── */
.view-btn{
  display:inline-block;font-family:var(--mn);font-size:8px;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ember);background:var(--emberF);
  border:1px solid rgba(176,96,48,0.28);
  padding:7px 14px;cursor:pointer;border-radius:1px;
  margin:0 0 4px 34px;transition:opacity 0.2s;
}
.view-btn:active{opacity:0.6;}

/* ── WORKOUT OVERLAY ── */
.overlay{
  display:none;position:fixed;inset:0;background:var(--bg);
  z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.overlay.open{display:block;}
.ov-header{
  position:sticky;top:0;
  background:rgba(8,8,6,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:max(env(safe-area-inset-top),16px) 24px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ov-title{font-family:var(--sf);font-size:20px;font-weight:400;letter-spacing:0.02em;}
.ov-close{
  font-family:var(--mn);font-size:8px;letter-spacing:0.18em;
  color:var(--muted);background:none;border:1px solid var(--border);
  padding:6px 14px;cursor:pointer;border-radius:1px;
}

.sess-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:16px 24px;}
.sess-tabs::-webkit-scrollbar{display:none;}
.sess-tab{
  flex-shrink:0;min-width:80px;padding:12px 8px;background:none;border:1px solid var(--border);
  cursor:pointer;text-align:center;border-radius:1px;transition:all 0.2s;
}
.sess-tab.active{background:var(--emberF);border-color:rgba(176,96,48,0.35);}
.sess-tab-day{font-family:var(--mn);font-size:8px;letter-spacing:0.15em;color:var(--muted);}
.sess-tab-name{font-family:var(--sf);font-size:16px;font-weight:400;color:var(--text);margin-top:2px;}
.sess-tab-type{font-family:var(--mn);font-size:8px;letter-spacing:0.1em;color:var(--muted);margin-top:1px;}
.sess-tab.active .sess-tab-name{color:var(--ember);}

.wo-rules{display:flex;flex-wrap:wrap;gap:5px;padding:0 24px 14px;}
.wo-rule{
  font-family:var(--mn);font-size:7px;letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 9px;border-radius:1px;background:var(--s1);border:1px solid var(--border);color:var(--gold);
}

.wo-section{padding:0 24px;margin-bottom:6px;}
.wo-section-label{
  font-family:var(--mn);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);
}

.ex-card{border:1px solid var(--border);border-radius:1px;margin-bottom:5px;overflow:hidden;}
.ex-block-hdr{font-family:var(--mn);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);padding:18px 0 8px;opacity:0.85;}
.ex-sub-hdr{font-family:var(--mn);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:12px 0 4px;opacity:0.7;}
.ex-head{
  display:flex;align-items:center;padding:13px 14px;
  background:var(--s1);cursor:pointer;gap:10px;
}
.ex-id{font-family:var(--mn);font-size:9px;color:var(--gold);font-weight:500;flex-shrink:0;}
.ex-name{font-family:var(--sf);font-size:17px;font-weight:400;color:var(--text);flex:1;}
.ex-load{font-family:var(--mn);font-size:9px;color:var(--muted);}
.ex-ss{font-family:var(--mn);font-size:8px;padding:2px 6px;background:rgba(155,142,196,0.12);color:#9B8EC4;letter-spacing:0.5px;}
.ex-body{display:none;background:var(--s2);padding:14px;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}

.ex-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.ex-stat{background:var(--s1);border-radius:1px;padding:7px;text-align:center;}
.ex-stat-l{font-family:var(--mn);font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.ex-stat-v{font-family:var(--mn);font-size:13px;color:var(--text);margin-top:3px;}

.ex-cue{font-family:var(--sf);font-size:13px;color:var(--muted);line-height:1.6;padding:2px 0 2px 14px;position:relative;}
.ex-cue::before{content:'→';position:absolute;left:0;color:var(--gold);}

.ex-sets{display:flex;gap:5px;margin:12px 0;}
.set-box{
  width:34px;height:34px;border-radius:1px;
  background:var(--s1);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:var(--mn);font-size:11px;color:var(--muted);
  transition:all 0.15s;
}
.set-box.done{background:var(--ember);border-color:var(--ember);color:var(--bg);}
.set-box:active{transform:scale(0.9);}

.rest-btn{
  width:100%;padding:11px;background:var(--s1);border:1px solid var(--border);
  border-radius:1px;cursor:pointer;color:var(--muted);
  font-family:var(--mn);font-size:10px;letter-spacing:0.1em;
  position:relative;overflow:hidden;
}
.rest-fill{position:absolute;left:0;top:0;height:100%;background:var(--emberF);transition:width 0.1s linear;}

.ex-subs{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ex-subs-title{font-family:var(--mn);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.ex-sub{font-family:var(--sf);font-size:12px;color:var(--muted);margin-bottom:3px;line-height:1.5;}

/* ── COUNTER UI ── */
.counter-row{display:flex;align-items:center;justify-content:space-between;padding:12px 24px 4px;}
.counter-info .counter-label{font-family:var(--mn);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
.counter-info .counter-sub{font-family:var(--sf);font-size:13px;color:var(--muted);margin-top:3px;}
.counter-ctrl{display:flex;align-items:center;gap:10px;}
.counter-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:1px;}
.counter-val{font-family:var(--mn);font-size:22px;font-weight:500;color:var(--ember);text-align:center;min-width:44px;}
.counter-unit{font-family:var(--mn);font-size:7px;letter-spacing:0.15em;color:var(--muted);text-align:center;margin-top:1px;}

</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-date" id="hDate">—</div>
        <div class="header-day" id="hDay">—</div>
      </div>
      <div>
        <div class="clock" id="clock">—:—</div>
        <div class="phase" id="phase">—</div>
      </div>
    </div>
  </div>

  <!-- DAY PROGRESS -->
  <div class="day-line"><div class="day-line-fill" id="day-fill"></div></div>

  <!-- ── PILLARS ── -->
  <div id="pillars"></div>

  <!-- MANTRA -->
  <div class="mantra" id="mantra">Surf &middot; Code &middot; Eat &middot; Sleep &middot; Repeat</div>

</div>

<!-- ── WORKOUT OVERLAY ── -->
<div class="overlay" id="workout-overlay">
  <div class="ov-header">
    <div class="ov-title">Training</div>
    <button class="ov-close" onclick="closeWorkout()">Close</button>
  </div>
  <div class="sess-tabs" id="sess-tabs"></div>
  <div class="wo-rules" id="wo-rules"></div>
  <div id="wo-counter" style="display:none"></div>
  <div class="wo-section" style="padding-bottom:48px">
    <div class="wo-section-label" id="wo-ex-label">Exercises</div>
    <div id="wo-exercises"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const PILLARS = [
  { id:'morning', label:'Morning Wake-up', color:'gold', from:0, to:10, items:[
    { id:'m1', label:'Supplements' },
    { id:'m2', label:'Smoothie' },
    { id:'m3', label:'Sunshine', sub:'10 min' },
    { id:'m4', label:'Cold Plunge', sub:'2–3 min' },
    { id:'m5', label:'Reading: Wisdom', sub:'Seneca · Meditations · Tao' },
  ]},
  { id:'rehab', label:'Rehab / Swim', color:'ember', from:10, to:12, items:[
    { id:'rh1', label:'The Daily Blueprint', sub:'Unlock · Align · Build — ~54 min', workout:true, sess:'DB' },
    { id:'rh2', label:'Cardio', sub:'Swim · Hike — polarised', workout:true, sess:'F' },
  ]},
  { id:'veraxus', label:'Veraxus', color:'sage', from:12, to:16, items:[
    { id:'v1', label:'Schema / Build', sub:'One deep session' },
    { id:'v2', label:'Demo / Sell', sub:'One outward step' },
  ]},
  { id:'admin', label:'Admin', color:'gold', from:16, to:18, items:[
    { id:'a1', label:'KDA Exit', sub:'One concrete step' },
    { id:'a2', label:'SARS', sub:'One concrete step' },
  ]},
  { id:'evening', label:'Evening Wind-down', color:'purple', from:18, to:24, items:[
    { id:'e1', label:'Food cut-off', sub:'6 pm' },
    { id:'e2', label:'Devices away', sub:'6:30 pm' },
    { id:'e3', label:'Hot shower / bath' },
    { id:'e4', label:'Reading: Fiction', sub:'The Odyssey' },
  ]},
];

const SESSIONS = [
  { id:'DB', label:'Daily Blueprint', type:'Unlock · Align · Build', day:'Daily', blueprint:true,
    rules:['POSITION BEFORE LOAD','STOP AT 4 OF 5 — REPS IN RESERVE','RIGHT LEADS AND GOES FIRST','SAME SHAPE DAILY'],
    exercises:[
      // Block 1 — Unlock · Pliability
      {id:'DBu1',name:'Pliability — Right Guard Chain', block:'unlock', subBlock:'Pliability', info:true,
       reps:'4–5 min', tempo:'Soft tool · 3–4/10',
       cues:['Order: adductors → lat/pec → calf → accessible psoas/QL','Soft tool, lateral, off the soft flank — never direct','3–4/10 pressure only — downregulate, don\'t dig','Soft tissue before the rehab work, not after'],
       subs:[]},
      // Block 1 — Unlock · Stretch / Open
      {id:'DBu2',name:'Adductor Stretch — Standing', block:'unlock', subBlock:'Stretch · Open', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['Right side first — right side leads','Posterior pelvic tilt — don\'t let lumbar extend','Breathe slowly into the inner thigh','First sensation only — not the deepest point'],
       subs:[]},
      {id:'DBu3',name:'Adductor Stretch — Half-Kneeling', block:'unlock', subBlock:'Stretch · Open', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['R leg out, heel in line with L knee','Upright torso — no forward lean','Breathe into the right inner thigh','Right side first'],
       subs:[]},
      {id:'DBu4',name:'Hip Flexor / Psoas Stretch — Kneeling Lunge', block:'unlock', subBlock:'Stretch · Open', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['Right leg back, left knee forward','Posterior pelvic tilt — tuck tailbone','Feel the right hip flexor under length','Neutral spine throughout — no lumbar extension'],
       subs:[]},
      {id:'DBu5',name:'Hip Flexor Stretch — Arms Up', block:'unlock', subBlock:'Stretch · Open', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['Right side first when prescribed','Maintain posterior pelvic tilt throughout','Breathe into the hip flexor — no lumbar extension'],
       subs:[]},
      {id:'DBu6',name:'Mermaid Stretch — R Leg Off Table', block:'unlock', subBlock:'Stretch · Open', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['Right leg off table — right side leads','Maintain spinal position per Lamberti instruction','Breathe slowly into the lateral chain'],
       subs:[]},
      {id:'DBu7',name:'Gastrocnemius Stretch — Single Leg', block:'unlock', subBlock:'Stretch · Open', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['Right leg first','Heel flat on floor — no rolling out','Knee straight — gastroc, not soleus','Ankle mobility directly feeds hip mobility'],
       subs:[]},
      // Block 1 — Unlock · Activate / Strengthen
      {id:'DBu8',name:'Hip External Rotation — Sitting with Band', block:'unlock', subBlock:'Activate · Strengthen', sets:4, reps:'6', tempo:'2-1-2', load:'Band', rest:30,
       cues:['Sitting — band around knees','Drive knee out against band — feel glute med','Right side first','Controlled return — don\'t let band snap back'],
       subs:[]},
      {id:'DBu9',name:'Donkey Kick — Hands and Knees', block:'unlock', subBlock:'Activate · Strengthen', sets:4, reps:'5', tempo:'2-1-2', load:'BW', rest:30,
       cues:['Right leg first','Spine neutral — no rotation, no QL compensation','Kick to hip height — no higher','Squeeze glute at top, not the lower back'],
       subs:[]},
      {id:'DBu10',name:'Staggered Stand-to-Sit', block:'unlock', subBlock:'Activate · Strengthen', sets:3, reps:'6', tempo:'Controlled', load:'BW', rest:30,
       cues:['Press toes down through the movement','Right leg leads — right side gets more demand','Control the descent — eccentric is the work','No collapsing into the seat'],
       subs:[]},
      {id:'DBu11',name:'Towel Calf Heel Raises — R Foot on Towel', block:'unlock', subBlock:'Activate · Strengthen', sets:5, reps:'10s', tempo:'Isometric', load:'BW', rest:20, isDuration:true,
       cues:['Right foot on towel — creates asymmetry for right-side adaptation','Press through forefoot — full calf contraction','10s hold per rep','Links calf loading to right-side LLD compensation'],
       subs:[]},
      {id:'DBu15',name:'Banded Ankle Work', block:'unlock', subBlock:'Activate · Strengthen', sets:3, reps:'8', tempo:'2-1-2', load:'Band', rest:30,
       cues:['Right ankle first','Band around forefoot — work through dorsiflexion and eversion','Controlled return — don\'t let band snap back','Ankle mobility feeds hip mobility'],
       subs:[]},
      {id:'DBu12',name:'Calf Heel Raise — Single Leg', block:'unlock', subBlock:'Activate · Strengthen', sets:4, reps:'4', tempo:'3-1-3', load:'BW', rest:30,
       cues:['Right leg first','3s up — 1s hold — 3s down','Full range: heel below platform level','Ankle mobility feeds hip mobility'],
       subs:[]},
      // Block 1 — Unlock · Trunk / Scapula
      {id:'DBu13',name:'Push-Up Plus — On Knees', block:'unlock', subBlock:'Trunk · Scapula', sets:4, reps:'4', tempo:'2-1-2', load:'BW', rest:30,
       cues:['At top of push-up: push extra — protract scapula fully','Feel serratus anterior engaging','Elbows stay slightly bent at "plus" position','Spine neutral — no sag or pike'],
       subs:[]},
      {id:'DBu14',name:'Plank with Pelvic Rotations', block:'unlock', subBlock:'Trunk · Scapula', sets:4, reps:'4', tempo:'Controlled', load:'BW', rest:30,
       cues:['R pelvis back to neutral only — not past neutral','Do not rotate into extension on the right side','Feel right glute and right oblique working together','Anterior/posterior tilt: right side to neutral is the target'],
       subs:[]},
      {id:'DBu16',name:'Pec Stretch — Door Frame', block:'unlock', subBlock:'Trunk · Scapula', sets:4, reps:'20s', tempo:'Passive', load:'BW', rest:15, isDuration:true,
       cues:['Forearm on door frame — elbow at shoulder height','Step through gently until first sensation in the pec','Right side first','Ribs down — stretch the pec, don\'t arch the lumbar'],
       subs:[]},
      {id:'DBu17',name:'Seated Wall Angel', block:'unlock', subBlock:'Trunk · Scapula', sets:3, reps:'6', tempo:'Controlled', load:'BW', rest:30,
       cues:['Focus on isolating the right scapula','Move from the shoulder joint — not the QL or right fascia','Keep ribs down, lower back against the wall','Slow — quality of scapular glide over range'],
       subs:[]},
      // Block 2 — Align
      {id:'DB4',name:'Dead Hang — Iso', block:'align', sets:3, reps:'20s', tempo:'Passive', load:'BW', rest:30, isDuration:true,
       cues:['Full passive decompression — let everything go','Shoulders pack naturally — no active pull','Breathe slowly, feel right spine lengthening','Not grip training — structural reset'],
       subs:[{n:'Supported Hang',d:'Slight knee bend for reduced load'}]},
      {id:'DB5',name:'Hip Thrust — Iso Hold', block:'align', sets:3, reps:'10s', tempo:'Isometric', load:'BW', rest:30, isDuration:true,

// ── STORAGE ──────────────────────────────────────────────────────────────────

function todayStr(){return new Date().toISOString().slice(0,10);}
function save(key,val){try{localStorage.setItem('kos3_'+key,val);}catch(e){}}
function load(key){try{return localStorage.getItem('kos3_'+key)||'';}catch(e){return '';}}
function saveDailyBool(key,val){try{localStorage.setItem('kos3_'+key+'_'+todayStr(),val?'1':'0');}catch(e){}}
function loadDailyBool(key){try{return localStorage.getItem('kos3_'+key+'_'+todayStr())==='1';}catch(e){return false;}}

// ── HEADER ───────────────────────────────────────────────────────────────────

function renderHeader(){
  var d=new Date();
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('hDate').textContent=d.getDate()+' '+months[d.getMonth()];
  document.getElementById('hDay').textContent=days[d.getDay()];
}
function phaseFor(h){
  if(h>=5&&h<10) return {cls:'ph-dawn', name:'Dawn'};
  if(h>=10&&h<17)return {cls:'ph-day',  name:'Day'};
  if(h>=17&&h<20)return {cls:'ph-dusk', name:'Dusk'};
  return {cls:'ph-night',name:'Night'};
}

function updateClock(){
  var d=new Date();
  document.getElementById('clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  var p=phaseFor(d.getHours());
  if(!document.body.classList.contains(p.cls)){
    document.body.classList.remove('ph-dawn','ph-day','ph-dusk','ph-night');
    document.body.classList.add(p.cls);
  }
  document.getElementById('phase').textContent=p.name;
}

// ── PILLARS ──────────────────────────────────────────────────────────────────

function currentPillarId(){
  var h=new Date().getHours();
  for(var i=0;i<PILLARS.length;i++){
    if(h>=PILLARS[i].from&&h<PILLARS[i].to)return PILLARS[i].id;
  }
  return PILLARS[PILLARS.length-1].id;
}

function renderPillars(){
  var c=document.getElementById('pillars');
  c.innerHTML='';
  var nowId=currentPillarId();
  PILLARS.forEach(function(pillar){
    var done=pillar.items.filter(function(it){return loadDailyBool(it.id);}).length;
    var track=document.createElement('div');
    track.className='track'+(done===pillar.items.length?' complete':'');
    var label=document.createElement('div');
    label.className='track-label';
    label.style.color='var(--'+pillar.color+')';
    label.innerHTML=pillar.label+(pillar.id===nowId?'<span class="track-now">now</span>':'');
    var count=document.createElement('span');
    count.className='track-count';
    count.textContent=done+' / '+pillar.items.length;
    label.appendChild(count);
    track.appendChild(label);
    pillar.items.forEach(function(item){
      var checked=loadDailyBool(item.id);
      var el=document.createElement('div');
      el.className='check-item'+(checked?' done':'');
      el.innerHTML='<div class="check-box'+(checked?' on-'+pillar.color:'')+'"><span class="check-tick">✓</span></div>'
        +'<div class="check-text">'+item.label
        +(item.sub?'<div class="check-sub">'+item.sub+'</div>':'')+'</div>';
      el.onclick=function(){
        saveDailyBool(item.id,!loadDailyBool(item.id));
        renderPillars();
      };
      track.appendChild(el);
      if(item.workout){
        var btn=document.createElement('div');
        btn.className='view-btn';
        btn.textContent=(item.sess==='F'?'Open cardio →':'Open the hour →');
        btn.onclick=function(){openWorkout(item.sess);};
        track.appendChild(btn);
      }
    });
    c.appendChild(track);
  });
  updateDayLine();
}

function updateDayLine(){
  var total=0,done=0;
  PILLARS.forEach(function(p){p.items.forEach(function(it){total++;if(loadDailyBool(it.id))done++;});});
  document.getElementById('day-fill').style.width=(done/total*100)+'%';
  document.getElementById('mantra').classList.toggle('lit',done===total);
}

// ── WORKOUT OVERLAY ──────────────────────────────────────────────────────────

var currentSessIdx=0;

function openWorkout(sessId){
  if(sessId){
    var idx=SESSIONS.findIndex(function(s){return s.id===sessId;});
    if(idx>=0)currentSessIdx=idx;
  }
  renderWorkout();document.getElementById('workout-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeWorkout(){document.getElementById('workout-overlay').classList.remove('open');document.body.style.overflow='';}

function renderWorkout(){
  document.getElementById('sess-tabs').innerHTML=SESSIONS.map(function(s,i){
    return '<div class="sess-tab'+(i===currentSessIdx?' active':'')+'" onclick="currentSessIdx='+i+';renderWorkout()">'
      +'<div class="sess-tab-day">'+s.day+'</div>'
      +'<div class="sess-tab-name">'+s.label+'</div>'
      +'<div class="sess-tab-type">'+s.type+'</div></div>';
  }).join('');

  var sess=SESSIONS[currentSessIdx];
  var isBlueprint=sess.blueprint===true;
  var isCardio=sess.cardio===true;

  document.getElementById('wo-rules').innerHTML=sess.rules.map(function(r){return '<div class="wo-rule">'+r+'</div>';}).join('');

  var counterEl=document.getElementById('wo-counter');
  if(isCardio){
    var cRot=parseInt(load('cardio_session')||'1');
    var cardioLabels=['','A · Z1-2 Swim · 45 min','B · Norwegian 4×4 · ~40 min','C · Z1-2 Swim · 45 min','D · Hike · 3 hours'];
    counterEl.style.display='block';
    counterEl.innerHTML='<div class="counter-row">'
      +'<div class="counter-info"><div class="counter-label">Weekly Cardio · Polarised</div><div class="counter-sub">'+cardioLabels[cRot]+'</div></div>'
      +'<div class="counter-ctrl">'
      +'<button class="counter-btn" onclick="adjCardioSession(-1)">−</button>'
      +'<div><div class="counter-val">'+['','A','B','C','D'][cRot]+'</div><div class="counter-unit">session</div></div>'
      +'<button class="counter-btn" onclick="adjCardioSession(1)">+</button>'
      +'</div></div>';
    document.getElementById('wo-ex-label').textContent='Cardio · '+cardioLabels[cRot];
  } else if(isBlueprint){
    var dbRot=parseInt(load('db_rotation')||'1');
    var dbBuildLabels=['','Build A — Lower','Build B — Push + Arms','Build C — Pull + Posterior'];
    counterEl.style.display='block';
    counterEl.innerHTML='<div class="counter-row">'
      +'<div class="counter-info"><div class="counter-label">~54 min · 3 Blocks</div><div class="counter-sub">'+dbBuildLabels[dbRot]+'</div></div>'
      +'<div class="counter-ctrl">'
      +'<button class="counter-btn" onclick="adjDBRotation(-1)">−</button>'
      +'<div><div class="counter-val">'+dbRot+'</div><div class="counter-unit">of 3</div></div>'
      +'<button class="counter-btn" onclick="adjDBRotation(1)">+</button>'
      +'</div></div>';
    document.getElementById('wo-ex-label').textContent='Daily Blueprint · Unlock · Align · '+dbBuildLabels[dbRot];
  }

  var dk=todayStr();
  var dbRot2=isBlueprint?parseInt(load('db_rotation')||'1'):0;
  var buildMap={1:'A',2:'B',3:'C'};
  var currentBuild=isBlueprint?buildMap[dbRot2]:'';
  var cRot2=isCardio?parseInt(load('cardio_session')||'1'):0;
  var cardioBlockMap={1:'A',2:'B',3:'C',4:'D'};
  var currentCardioBlock=isCardio?cardioBlockMap[cRot2]:'';
  var lastBlock='';
  var lastSubBlock='';
  var eh='';
  sess.exercises.forEach(function(ex){
    // Cardio: skip exercises not in current session
    if(isCardio&&ex.cardioBlock&&ex.cardioBlock!==currentCardioBlock)return;
    // Blueprint: skip build exercises not in current rotation
    if(isBlueprint&&ex.buildBlock&&ex.buildBlock!==currentBuild)return;
    // Blueprint: insert block headers on transition
    if(isBlueprint&&ex.block!==lastBlock){
      lastBlock=ex.block;
      lastSubBlock='';
      var bhdrs={unlock:'Block 1 — Unlock · ~18 min · Daily',align:'Block 2 — Align · ~14 min · Daily',build:'Block 3 — Build · ~22 min'};
      eh+='<div class="ex-block-hdr">'+(bhdrs[ex.block]||ex.block)+'</div>';
    }
    // Blueprint: insert sub-block headers on transition
    if(isBlueprint&&ex.subBlock&&ex.subBlock!==lastSubBlock){
      lastSubBlock=ex.subBlock;
      eh+='<div class="ex-sub-hdr">'+ex.subBlock+'</div>';
    }
    var isInfo=ex.info===true;
    var ss=ex.superset?'<span class="ex-ss">SS '+ex.superset+'</span>':ex.supersetWith?'<span class="ex-ss">SS '+ex.supersetWith+'</span>':'';
    eh+='<div class="ex-card" id="ex-'+ex.id+'">'
      +'<div class="ex-head" onclick="document.getElementById(\'ex-'+ex.id+'\').classList.toggle(\'open\')">'
      +'<span class="ex-id">'+ex.id+'</span>'
      +'<span class="ex-name">'+ex.name+'</span>'+ss
      +'<span class="ex-load">'+(ex.load||'')+'</span></div>'
      +'<div class="ex-body">';
    if(isInfo){
      eh+='<div class="ex-stats" style="grid-template-columns:1fr 1fr">'
        +'<div class="ex-stat"><div class="ex-stat-l">Duration</div><div class="ex-stat-v">'+ex.reps+'</div></div>'
        +'<div class="ex-stat"><div class="ex-stat-l">Effort</div><div class="ex-stat-v">'+(ex.tempo||'—')+'</div></div>'
        +'</div>';
    } else {
      eh+='<div class="ex-stats">'
        +'<div class="ex-stat"><div class="ex-stat-l">Load</div><div class="ex-stat-v">'+(ex.load||'—')+'</div></div>'
        +'<div class="ex-stat"><div class="ex-stat-l">Reps</div><div class="ex-stat-v">'+ex.reps+'</div></div>'
        +'<div class="ex-stat"><div class="ex-stat-l">Tempo</div><div class="ex-stat-v">'+(ex.tempo||'—')+'</div></div>'
        +'<div class="ex-stat"><div class="ex-stat-l">Rest</div><div class="ex-stat-v">'+ex.rest+'s</div></div>'
        +'</div>';
    }
    eh+='<div class="ex-cues">'+ex.cues.map(function(c){return '<div class="ex-cue">'+c+'</div>';}).join('')+'</div>';
    if(!isInfo){
      eh+='<div class="ex-sets">';
      for(var s=1;s<=ex.sets;s++){
        var sk='kos3_str_'+dk+'_'+ex.id+'_s'+s;
        var sd=(function(k){try{return localStorage.getItem(k)==='1';}catch(e){return false;}})(sk);
        eh+='<div class="set-box'+(sd?' done':'')+'" onclick="lsToggleStr(this,\''+sk+'\')">'+s+'</div>';
      }
      eh+='</div>'
        +'<div class="rest-btn" onclick="startRest(this,'+ex.rest+')" id="rest-'+ex.id+'">'
        +'<div class="rest-fill" style="width:0%"></div>'
        +'<span style="position:relative;z-index:1">Start '+ex.rest+'s rest</span></div>';
    }
    if(ex.subs&&ex.subs.length){
      eh+='<div class="ex-subs"><div class="ex-subs-title">Substitutions</div>';
      ex.subs.forEach(function(s){eh+='<div class="ex-sub"><strong style="color:var(--text)">'+s.n+'</strong> — '+s.d+'</div>';});
      eh+='</div>';
    }
    eh+='</div></div>';
  });
  document.getElementById('wo-exercises').innerHTML=eh;
}

function adjDBRotation(d){var v=parseInt(load('db_rotation')||'1')+d;if(v<1)v=3;if(v>3)v=1;save('db_rotation',String(v));renderWorkout();}
function adjCardioSession(d){var v=parseInt(load('cardio_session')||'1')+d;if(v<1)v=4;if(v>4)v=1;save('cardio_session',String(v));renderWorkout();}
function lsToggleStr(el,key){
  el.classList.toggle('done');
  try{localStorage.setItem(key,el.classList.contains('done')?'1':'0');}catch(e){}
}

function startRest(btn,secs){
  var fill=btn.querySelector('.rest-fill');
  var label=btn.querySelector('span');
  if(btn._r){clearInterval(btn._r);btn._r=null;fill.style.width='0%';label.textContent='Start '+secs+'s rest';return;}
  var rem=secs;label.textContent=rem+'s';
  btn._r=setInterval(function(){
    rem--;fill.style.width=((secs-rem)/secs*100)+'%';label.textContent=rem+'s';
    if(rem<=0){clearInterval(btn._r);btn._r=null;fill.style.width='100%';label.textContent='Done ✓';
      setTimeout(function(){fill.style.width='0%';label.textContent='Start '+secs+'s rest';},2000);}
  },1000);
}

// ── INIT ─────────────────────────────────────────────────────────────────────

renderHeader();
updateClock();
setInterval(updateClock,1000);
renderPillars();
