<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Komorebi OS">
<meta name="theme-color" content="#080806">
<title>Komorebi OS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080806;
  --s1:     #0d0d0a;
  --s2:     #111110;
  --border: #1c1c18;
  --borderM:#2a2a25;
  --text:   #e4e0d4;
  --muted:  #706c65;
  --dim:    #3a3a35;
  --gold:   #c8a455;
  --ember:  #b06030;
  --sage:   #5a7858;
  --goldF:  rgba(200,164,85,0.08);
  --emberF: rgba(176,96,48,0.08);
  --sageF:  rgba(90,120,88,0.08);
  --sf: 'Cormorant Garamond', serif;
  --mn: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  background:var(--bg);color:var(--text);
  font-family:var(--mn);
  min-height:100vh;min-height:-webkit-fill-available;
  overscroll-behavior:none;
}

.app{
  max-width:430px;margin:0 auto;
  padding:max(env(safe-area-inset-top),28px) 0 max(env(safe-area-inset-bottom),48px);
}

/* ── HEADER ── */
.header{
  padding:0 24px 28px;
  border-bottom:1px solid var(--border);
  margin-bottom:0;
}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;}
.header-date{
  font-family:var(--sf);font-size:38px;font-weight:300;
  letter-spacing:-0.01em;line-height:1;
}
.header-day{
  font-family:var(--mn);font-size:8px;letter-spacing:0.2em;
  color:var(--muted);text-transform:uppercase;margin-top:7px;
}
.clock{
  font-family:var(--mn);font-size:11px;color:var(--dim);
  letter-spacing:0.06em;padding-top:6px;
}

/* ── TRACK ── */
.track{padding:28px 24px;border-bottom:1px solid var(--border);}
.track-label{
  font-family:var(--mn);font-size:8px;letter-spacing:0.22em;
  text-transform:uppercase;margin-bottom:22px;
  display:flex;align-items:center;gap:12px;
}
.track-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── FIELDS ── */
.field-label{
  font-family:var(--mn);font-size:8px;letter-spacing:0.14em;
  color:var(--muted);text-transform:uppercase;margin-bottom:5px;
}
.field-line{
  width:100%;background:none;border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);font-family:var(--sf);font-size:18px;font-weight:300;
  padding:7px 0;outline:none;margin-bottom:16px;
  transition:border-color 0.2s;
}
.field-line:focus{border-color:var(--borderM);}
.field-line::placeholder{color:var(--dim);}

/* ── CHECKLIST ── */
.check-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.check-item:last-child{border-bottom:none;}
.check-item:active{opacity:0.55;}

.check-box{
  width:20px;height:20px;flex-shrink:0;margin-top:2px;
  border:1px solid var(--borderM);border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.check-box.on-gold{background:var(--gold);border-color:var(--gold);}
.check-box.on-ember{background:var(--ember);border-color:var(--ember);}
.check-box.on-sage{background:var(--sage);border-color:var(--sage);}
.check-tick{font-size:10px;color:var(--bg);font-weight:700;opacity:0;transition:opacity 0.15s;}
.check-box.on-gold .check-tick,
.check-box.on-ember .check-tick,
.check-box.on-sage .check-tick{opacity:1;}

.check-text{
  font-family:var(--sf);font-size:17px;font-weight:300;
  color:var(--text);line-height:1.25;transition:color 0.2s;flex:1;
}
.check-sub{
  font-family:var(--mn);font-size:9px;color:var(--muted);
  letter-spacing:0.06em;margin-top:3px;
}
.check-item.done .check-text{color:var(--dim);}
.check-item.done .check-sub{color:var(--dim);}

/* ── BODY TRACK ── */
.session-line{
  font-family:var(--sf);font-size:22px;font-weight:400;
  color:var(--text);margin-bottom:5px;line-height:1.2;
}
.session-meta{
  font-family:var(--mn);font-size:9px;color:var(--muted);
  letter-spacing:0.1em;margin-bottom:18px;
}
.view-btn{
  display:inline-block;font-family:var(--mn);font-size:8px;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--ember);background:var(--emberF);
  border:1px solid rgba(176,96,48,0.28);
  padding:7px 14px;cursor:pointer;border-radius:1px;
  margin-bottom:26px;transition:opacity 0.2s;
}
.view-btn:active{opacity:0.6;}

.time-row{
  display:flex;gap:32px;margin-top:22px;
  padding-top:22px;border-top:1px solid var(--border);
}
.time-label{
  font-family:var(--mn);font-size:8px;letter-spacing:0.14em;
  color:var(--muted);text-transform:uppercase;margin-bottom:5px;
}
.time-value{
  font-family:var(--sf);font-size:24px;font-weight:300;color:var(--text);
}

/* ── SPINE TRACK ── */
.spine-source{
  font-family:var(--sf);font-size:13px;font-style:italic;
  color:var(--muted);letter-spacing:0.03em;margin-bottom:22px;
}
.spine-field{
  width:100%;background:none;border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);font-family:var(--sf);font-size:17px;font-weight:300;
  padding:7px 0;outline:none;margin-bottom:16px;
  transition:border-color 0.2s;
}
.spine-field:focus{border-color:var(--sage);}
.spine-field::placeholder{color:var(--dim);}

/* ── WORKOUT OVERLAY ── */
.overlay{
  display:none;position:fixed;inset:0;background:var(--bg);
  z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.overlay.open{display:block;}
.ov-header{
  position:sticky;top:0;
  background:rgba(8,8,6,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:max(env(safe-area-inset-top),16px) 24px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.ov-title{font-family:var(--sf);font-size:20px;font-weight:400;letter-spacing:0.02em;}
.ov-close{
  font-family:var(--mn);font-size:8px;letter-spacing:0.18em;
  color:var(--muted);background:none;border:1px solid var(--border);
  padding:6px 14px;cursor:pointer;border-radius:1px;
}

.sess-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:16px 24px;}
.sess-tab{
  padding:12px 8px;background:none;border:1px solid var(--border);
  cursor:pointer;text-align:center;border-radius:1px;transition:all 0.2s;
}
.sess-tab.active{background:var(--emberF);border-color:rgba(176,96,48,0.35);}
.sess-tab-day{font-family:var(--mn);font-size:8px;letter-spacing:0.15em;color:var(--muted);}
.sess-tab-name{font-family:var(--sf);font-size:16px;font-weight:400;color:var(--text);margin-top:2px;}
.sess-tab-type{font-family:var(--mn);font-size:8px;letter-spacing:0.1em;color:var(--muted);margin-top:1px;}
.sess-tab.active .sess-tab-name{color:var(--ember);}

.wo-rules{display:flex;flex-wrap:wrap;gap:5px;padding:0 24px 14px;}
.wo-rule{
  font-family:var(--mn);font-size:7px;letter-spacing:0.1em;text-transform:uppercase;
  padding:3px 9px;border-radius:1px;background:var(--s1);border:1px solid var(--border);color:var(--gold);
}

.wo-section{padding:0 24px;margin-bottom:6px;}
.wo-section-label{
  font-family:var(--mn);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);
}

.ex-card{border:1px solid var(--border);border-radius:1px;margin-bottom:5px;overflow:hidden;}
.ex-head{
  display:flex;align-items:center;padding:13px 14px;
  background:var(--s1);cursor:pointer;gap:10px;
}
.ex-id{font-family:var(--mn);font-size:9px;color:var(--gold);font-weight:500;flex-shrink:0;}
.ex-name{font-family:var(--sf);font-size:17px;font-weight:400;color:var(--text);flex:1;}
.ex-load{font-family:var(--mn);font-size:9px;color:var(--muted);}
.ex-ss{font-family:var(--mn);font-size:8px;padding:2px 6px;background:rgba(155,142,196,0.12);color:#9B8EC4;letter-spacing:0.5px;}
.ex-body{display:none;background:var(--s2);padding:14px;border-top:1px solid var(--border);}
.ex-card.open .ex-body{display:block;}

.ex-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:12px;}
.ex-stat{background:var(--s1);border-radius:1px;padding:7px;text-align:center;}
.ex-stat-l{font-family:var(--mn);font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.ex-stat-v{font-family:var(--mn);font-size:13px;color:var(--text);margin-top:3px;}

.ex-cue{font-family:var(--sf);font-size:13px;color:var(--muted);line-height:1.6;padding:2px 0 2px 14px;position:relative;}
.ex-cue::before{content:'→';position:absolute;left:0;color:var(--gold);}

.ex-sets{display:flex;gap:5px;margin:12px 0;}
.set-box{
  width:34px;height:34px;border-radius:1px;
  background:var(--s1);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:var(--mn);font-size:11px;color:var(--muted);
  transition:all 0.15s;
}
.set-box.done{background:var(--ember);border-color:var(--ember);color:var(--bg);}
.set-box:active{transform:scale(0.9);}

.rest-btn{
  width:100%;padding:11px;background:var(--s1);border:1px solid var(--border);
  border-radius:1px;cursor:pointer;color:var(--muted);
  font-family:var(--mn);font-size:10px;letter-spacing:0.1em;
  position:relative;overflow:hidden;
}
.rest-fill{position:absolute;left:0;top:0;height:100%;background:var(--emberF);transition:width 0.1s linear;}

.ex-subs{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ex-subs-title{font-family:var(--mn);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.ex-sub{font-family:var(--sf);font-size:12px;color:var(--muted);margin-bottom:3px;line-height:1.5;}

.wo-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.wo-item:last-child{border-bottom:none;}
.wo-item:active{opacity:0.6;}
.wo-item-name{font-family:var(--sf);font-size:16px;font-weight:300;flex:1;transition:color 0.2s;}
.wo-item-dur{font-family:var(--mn);font-size:9px;color:var(--muted);letter-spacing:0.08em;padding-top:3px;}
.wo-item.done .wo-item-name{color:var(--dim);}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-date" id="hDate">—</div>
        <div class="header-day" id="hDay">—</div>
      </div>
      <div class="clock" id="clock">—:—</div>
    </div>
  </div>

  <!-- ── VERAXUS ── -->
  <div class="track">
    <div class="track-label" style="color:var(--gold)">Veraxus</div>

    <div class="field-label">Status</div>
    <input class="field-line" id="v-status" placeholder="One sentence."
      oninput="save('v-status',this.value)">

    <div class="field-label">Next action</div>
    <input class="field-line" id="v-next" placeholder="One sentence."
      oninput="save('v-next',this.value)">

    <div class="field-label" style="margin-top:20px;margin-bottom:8px">Demo readiness</div>
    <div id="v-checklist"></div>
  </div>

  <!-- ── BODY ── -->
  <div class="track">
    <div class="track-label" style="color:var(--ember)">Body</div>

    <div class="session-line" id="session-line">—</div>
    <div class="session-meta" id="session-meta"></div>
    <div class="view-btn" onclick="openWorkout()">View workout →</div>

    <div class="field-label" style="margin-bottom:8px">Daily correctives</div>
    <div id="correctives"></div>

    <div class="time-row">
      <div>
        <div class="time-label">Food cutoff</div>
        <div class="time-value">17:30</div>
      </div>
      <div>
        <div class="time-label">Bedtime</div>
        <div class="time-value">20:00</div>
      </div>
    </div>
  </div>

  <!-- ── THE SPINE ── -->
  <div class="track" style="border-bottom:none">
    <div class="track-label" style="color:var(--sage)">The Spine</div>

    <div class="spine-source">The Odyssey — Emily Wilson translation</div>

    <div class="field-label">Progress</div>
    <input class="spine-field" id="spine-progress" placeholder="Book 1, line 1"
      oninput="save('spine-progress',this.value)">

    <div class="field-label">Passage today</div>
    <input class="spine-field" id="spine-passage" placeholder="One line."
      oninput="saveToday('spine-passage',this.value)">
  </div>

  <!-- MANTRA -->
  <div style="padding:32px 24px 4px;text-align:center;">
    <div style="font-family:var(--mn);font-size:8px;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;">
      Surf &middot; Code &middot; Eat &middot; Sleep &middot; Repeat
    </div>
  </div>

</div>

<!-- ── WORKOUT OVERLAY ── -->
<div class="overlay" id="workout-overlay">
  <div class="ov-header">
    <div class="ov-title">Strength Protocol</div>
    <button class="ov-close" onclick="closeWorkout()">Close</button>
  </div>
  <div class="sess-tabs" id="sess-tabs"></div>
  <div class="wo-rules" id="wo-rules"></div>
  <div class="wo-section">
    <div class="wo-section-label">Warmup · 8 min</div>
    <div id="wo-warmup"></div>
  </div>
  <div class="wo-section">
    <div class="wo-section-label" id="wo-ex-label">Exercises</div>
    <div id="wo-exercises"></div>
  </div>
  <div class="wo-section" style="padding-bottom:48px">
    <div class="wo-section-label">Cooldown · 15 min</div>
    <div id="wo-cooldown"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const READINESS = [
  'MCP — quote engine live',
  'Agent portal — deployed',
  'Specials + packages — Machaba complete',
  'Auth + login — working',
  'PDF brochures — wired',
  'Data audit — clean',
  'Pitch deck — ready',
  'Machaba Safaris — meeting booked',
  'First operator pitch — done',
  'First commercial agreement — signed',
];

const CORRECTIVES = [
  { id:'c1', label:'Spine roller', note:'Full length · 2 min' },
  { id:'c2', label:'Right hip release', note:'Hip flexor + psoas · 90s' },
  { id:'c3', label:'Bird dogs', note:'5 each side · spine neutral' },
  { id:'c4', label:'Hip bridge iso — right leads', note:'5 × 5s hold' },
  { id:'c5', label:'Dead hang', note:'Full decompression · 30s' },
];

const DAY_SESSIONS = { 1:'A', 3:'B', 5:'C' };
const DAY_LABELS = {
  0:{ line:'Sunday — Rest',               meta:'Recovery · No training' },
  1:{ line:'Monday — Session A',          meta:'Push · Incline press, shoulder, pull-up' },
  2:{ line:'Tuesday — Z2',                meta:'Swim or beach walk · 50 min' },
  3:{ line:'Wednesday — Session B',       meta:'Pull · Row, face pull, curl, hang' },
  4:{ line:'Thursday — Active Recovery',  meta:'Z2 ruck or swim · Nature walk' },
  5:{ line:'Friday — Session C',          meta:'Hinge + Lower · Swing, RDL, glute' },
  6:{ line:'Saturday — Surf',             meta:'Surf or sport · Family · Recovery' },
};

const WARMUP = [
  {id:'w1',name:'Dead Hang',              note:'Full decompression. Let everything go.',            dur:'30s'},
  {id:'w2',name:'Supine Psoas Stretch',   note:'Posterior pelvic tilt. Breathe into the right.',   dur:'60s'},
  {id:'w3',name:'Glute Bridge Iso',       note:'Right leads. 5s hold each.',                       dur:'5 × 5s'},
  {id:'w4',name:'Wall Hip CARs',          note:'Right first. Full range, zero compensation.',       dur:'5 each'},
  {id:'w5',name:'Bird Dog',               note:'Spine neutral. No rotation. Pause at extension.',   dur:'5 each'},
  {id:'w6',name:'Band Pull-Apart',        note:'Warm the rear delts. Right shoulder back.',         dur:'15 reps'},
];

const COOLDOWN = [
  {id:'cd1',name:'Wall Hip CARs',         note:'Slow. Full range. Right side.',                    dur:'5 each'},
  {id:'cd2',name:'Supine Psoas Stretch',  note:'Decompress what you loaded.',                      dur:'60s'},
  {id:'cd3',name:'Dead Hang',             note:'Final spinal decompression.',                      dur:'30s'},
  {id:'cd4',name:'Meditation',            note:'Eyes closed, effortless. Non-negotiable.',         dur:'10–15 min'},
  {id:'cd5',name:'Cold Shower',           note:'Finish cold. Own the discomfort.',                 dur:'Until cold'},
];

const SESSIONS = [
  { id:'A', label:'Session A', type:'Push', day:'Mon',
    rules:['RIGHT LEADS','POSITION FIRST','NO GRIND','HEEL LIFT — RIGHT SHOE'],
    exercises:[
      {id:'A1',name:'Incline DB Press',         sets:4,reps:'5',   tempo:'3-1-1',   load:'16kg',        rest:120,
       cues:['Right side leads every set','Pack lats into bench','Pause at bottom — own the position','Stop at first slow rep'],
       subs:[{n:'Floor Press',d:'Knees bent, triceps touch floor'},{n:'Wall-Supported Press',d:'Sit against wall, enforces upright torso'}]},
      {id:'A2',name:'Push Press — KB Single Arm',sets:4,reps:'3', tempo:'Explosive',load:'8kg',         rest:120,
       cues:['Heel lift in right shoe','Right glute squeeze before dip','Small dip — legs drive','Full lockout 1s at top','Right arm first'],
       subs:[{n:'Seated DB Shoulder Press',d:'Removes LLD issue'},{n:'Half-Kneeling KB Press',d:'Right knee down'}]},
      {id:'A3',name:'Supported Lateral Raise',   sets:3,reps:'6',  tempo:'2-1-2',   load:'4kg',         rest:90, superset:'A4',
       cues:['Chest on incline bench','Lead with elbow not wrist','2s eccentric','No shrug'],
       subs:[{n:'Side-Lying Lateral Raise',d:'Pure isolation'},{n:'Seated Lateral Raise',d:'Slight forward lean'}]},
      {id:'A4',name:'Band Pull-Apart',           sets:3,reps:'10', tempo:'Controlled',load:'Light band', rest:90, supersetWith:'A3',
       cues:['Superset with A3 — no rest','Thumbs behind ears','Feel right rear delt','Corrective — not optional'],
       subs:[]},
      {id:'A5',name:'Banded Pull-Up (Assisted)', sets:2,reps:'5',  tempo:'2-1-2',   load:'Band assist', rest:90,
       cues:['Pack lats before pulling','Dead hang at bottom each rep','Right side leads'],
       subs:[{n:'Band Face Pull',d:'External rotation emphasis'},{n:'Single Arm Band Row',d:'Right leads'}]},
      {id:'A6',name:'Tricep Pushdown — Band',    sets:3,reps:'8',  tempo:'2-1-2',   load:'Medium band', rest:90,
       cues:['Elbows pinned','Full extension at bottom','Slow eccentric','Right arm first if unilateral'],
       subs:[{n:'Close-Grip Floor Press',d:'Loads triceps significantly'},{n:'Diamond Push-Up',d:'Bodyweight, anywhere'}]},
    ]
  },
  { id:'B', label:'Session B', type:'Pull', day:'Wed',
    rules:['RIGHT LEADS','ELBOW TO HIP','OWN THE CONTRACTION','NO GRIND'],
    exercises:[
      {id:'B1',name:'Single Arm DB Row',   sets:4,reps:'5', tempo:'2-1-2', load:'20kg',        rest:120,
       cues:['Right arm leads','Elbow to hip — not hand to shoulder','Pause and contract at top','No torso rotation','If QL fires before lat — stop'],
       subs:[{n:'Band Row (anchored)',d:'Same cues apply'},{n:'Incline DB Row',d:'Removes spinal loading'}]},
      {id:'B2',name:'Band Face Pull',      sets:3,reps:'8', tempo:'2-2-2', load:'Medium band',  rest:90,
       cues:['Anchor at upper chest height','Thumbs behind ears','External rotation emphasis','Right rear delt must work'],
       subs:[{n:'Band Pull-Apart',d:'Arms straight throughout'},{n:'Prone DB Rear Delt Raise',d:'Face down on incline'}]},
      {id:'B3',name:'Incline DB Curl',     sets:3,reps:'6', tempo:'2-1-3', load:'8kg',          rest:90,
       cues:['Sit back on incline','3s eccentric','Shoulder pinned','Right arm first','No swing'],
       subs:[{n:'Standing DB Curl',d:'Strict form'},{n:'Band Curl',d:'Resistance increases at peak'}]},
      {id:'B4',name:'Dead Hang',           sets:3,reps:'30s',tempo:'Passive',load:'Bodyweight', rest:60, isDuration:true,
       cues:['Structural maintenance','Full passive decompression','Feel right spine lengthening','Breathe slowly'],
       subs:[{n:'Supported Hang',d:'Slight knee bend'},{n:'Doorframe Hang',d:'Grip top of doorframe'}]},
      {id:'B5',name:'Bird Dog Row',        sets:3,reps:'5', tempo:'3-1-2', load:'8kg',          rest:90,
       cues:['Start in bird dog position','Row while holding extension','Stability first','Right arm rows, right leg extends'],
       subs:[{n:'Plank DB Row',d:'Less range but stable'},{n:'Kneeling Single Arm Row',d:'Both knees down'}]},
    ]
  },
  { id:'C', label:'Session C', type:'Hinge + Lower', day:'Fri',
    rules:['RIGHT LEADS','HIP HINGE NOT SQUAT','GLUTE AT TOP','POSITION FIRST'],
    exercises:[
      {id:'C1',name:'KB Swing',              sets:5,reps:'5', tempo:'Explosive', load:'20kg',              rest:120,
       cues:['Hip hinge — not a squat','Explosive hip snap','Right glute squeeze at top','Dead stop between reps if needed','Stop if lower back takes over'],
       subs:[{n:'KB Deadlift',d:'Same hinge, no swing'},{n:'Romanian Deadlift — DB',d:'Slow eccentric hinge'}]},
      {id:'C2',name:'Single Leg RDL',        sets:4,reps:'5', tempo:'3-1-2', load:'12.5kg contralateral',  rest:120,
       cues:['Right leg leads','Contralateral load','3s down, own the bottom','Stop if QL fires before hamstring','Slight knee bend'],
       subs:[{n:'SL RDL — Bodyweight',d:'Build motor pattern first'},{n:'Hip Hinge to Wall',d:'Groove the pattern'}]},
      {id:'C3',name:'Goblet Squat Hold',     sets:3,reps:'20s',tempo:'Static',  load:'8kg',               rest:90, isDuration:true,
       cues:['Posterior pelvic tilt','Elbows inside knees','Feel right hip decompressing','Breathe slowly','Corrective as much as strength'],
       subs:[{n:'Bodyweight Squat Hold',d:'Arms forward for counterbalance'},{n:'Box Squat Hold',d:'Controls depth'}]},
      {id:'C4',name:'Slant Board Calf Raise',sets:3,reps:'8', tempo:'3-1-3', load:'BW / 8kg',             rest:90,
       cues:['Right leads','3s eccentric','Full range — heel below board','Ankle mobility = hip mobility'],
       subs:[{n:'Step Edge Calf Raise',d:'Same range principle'},{n:'Seated Calf Raise',d:'Loads soleus more'}]},
      {id:'C5',name:'Glute Bridge Iso',      sets:3,reps:'5 × 5s',tempo:'Isometric',load:'Bodyweight',    rest:60,
       cues:['Right glute must fire first','If it doesn\'t — reset','5s hold, full contraction','Feel anterior hip opening','Closes every lower session'],
       subs:[]},
    ]
  },
];

// ── STORAGE ──────────────────────────────────────────────────────────────────

function todayStr(){return new Date().toISOString().slice(0,10);}
function save(key,val){try{localStorage.setItem('kos3_'+key,val);}catch(e){}}
function load(key){try{return localStorage.getItem('kos3_'+key)||'';}catch(e){return '';}}
function saveToday(key,val){try{localStorage.setItem('kos3_'+key+'_'+todayStr(),val);}catch(e){}}
function loadToday(key){try{return localStorage.getItem('kos3_'+key+'_'+todayStr())||'';}catch(e){return '';}}
function saveBool(key,val){try{localStorage.setItem('kos3_'+key,val?'1':'0');}catch(e){}}
function loadBool(key){try{return localStorage.getItem('kos3_'+key)==='1';}catch(e){return false;}}
function saveDailyBool(key,val){try{localStorage.setItem('kos3_'+key+'_'+todayStr(),val?'1':'0');}catch(e){}}
function loadDailyBool(key){try{return localStorage.getItem('kos3_'+key+'_'+todayStr())==='1';}catch(e){return false;}}

// ── HEADER ───────────────────────────────────────────────────────────────────

function renderHeader(){
  var d=new Date();
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('hDate').textContent=d.getDate()+' '+months[d.getMonth()];
  document.getElementById('hDay').textContent=days[d.getDay()];
}
function updateClock(){
  var d=new Date();
  document.getElementById('clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// ── VERAXUS ──────────────────────────────────────────────────────────────────

function renderVeraxus(){
  document.getElementById('v-status').value=load('v-status');
  document.getElementById('v-next').value=load('v-next');
  var c=document.getElementById('v-checklist');
  c.innerHTML='';
  READINESS.forEach(function(label,i){
    var key='v-ready-'+i;
    var checked=loadBool(key);
    var el=document.createElement('div');
    el.className='check-item'+(checked?' done':'');
    el.innerHTML='<div class="check-box'+(checked?' on-gold':'')+'"><span class="check-tick">✓</span></div>'
      +'<div class="check-text">'+label+'</div>';
    el.onclick=function(){
      var now=!loadBool(key);
      saveBool(key,now);
      el.classList.toggle('done',now);
      el.querySelector('.check-box').classList.toggle('on-gold',now);
    };
    c.appendChild(el);
  });
}

// ── BODY ─────────────────────────────────────────────────────────────────────

var currentSessIdx=0;

function renderBody(){
  var dow=new Date().getDay();
  var info=DAY_LABELS[dow];
  document.getElementById('session-line').textContent=info.line;
  document.getElementById('session-meta').textContent=info.meta;
  var sessId=DAY_SESSIONS[dow];
  if(sessId)currentSessIdx=SESSIONS.findIndex(function(s){return s.id===sessId;});
  var c=document.getElementById('correctives');
  c.innerHTML='';
  CORRECTIVES.forEach(function(item){
    var key='corr-'+item.id;
    var checked=loadDailyBool(key);
    var el=document.createElement('div');
    el.className='check-item'+(checked?' done':'');
    el.innerHTML='<div class="check-box'+(checked?' on-ember':'')+'"><span class="check-tick">✓</span></div>'
      +'<div class="check-text">'+item.label
      +'<div class="check-sub">'+item.note+'</div></div>';
    el.onclick=function(){
      var now=!loadDailyBool(key);
      saveDailyBool(key,now);
      el.classList.toggle('done',now);
      el.querySelector('.check-box').classList.toggle('on-ember',now);
    };
    c.appendChild(el);
  });
}

// ── SPINE ────────────────────────────────────────────────────────────────────

function renderSpine(){
  document.getElementById('spine-progress').value=load('spine-progress');
  document.getElementById('spine-passage').value=loadToday('spine-passage');
}

// ── WORKOUT OVERLAY ──────────────────────────────────────────────────────────

function openWorkout(){renderWorkout();document.getElementById('workout-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeWorkout(){document.getElementById('workout-overlay').classList.remove('open');document.body.style.overflow='';}

function renderWorkout(){
  // Session tabs
  document.getElementById('sess-tabs').innerHTML=SESSIONS.map(function(s,i){
    return '<div class="sess-tab'+(i===currentSessIdx?' active':'')+'" onclick="currentSessIdx='+i+';renderWorkout()">'
      +'<div class="sess-tab-day">'+s.day+'</div>'
      +'<div class="sess-tab-name">'+s.label+'</div>'
      +'<div class="sess-tab-type">'+s.type+'</div></div>';
  }).join('');

  var sess=SESSIONS[currentSessIdx];
  document.getElementById('wo-rules').innerHTML=sess.rules.map(function(r){return '<div class="wo-rule">'+r+'</div>';}).join('');
  document.getElementById('wo-ex-label').textContent=sess.type+' · '+sess.exercises.length+' exercises';

  renderWOItems('wo-warmup',WARMUP,'warmup');
  renderWOItems('wo-cooldown',COOLDOWN,'cooldown');

  var dk=todayStr();
  var eh='';
  sess.exercises.forEach(function(ex){
    var ss=ex.superset?'<span class="ex-ss">SS '+ex.superset+'</span>':ex.supersetWith?'<span class="ex-ss">SS '+ex.supersetWith+'</span>':'';
    eh+='<div class="ex-card" id="ex-'+ex.id+'">'
      +'<div class="ex-head" onclick="document.getElementById(\'ex-'+ex.id+'\').classList.toggle(\'open\')">'
      +'<span class="ex-id">'+ex.id+'</span>'
      +'<span class="ex-name">'+ex.name+'</span>'+ss
      +'<span class="ex-load">'+ex.load+'</span></div>'
      +'<div class="ex-body">'
      +'<div class="ex-stats">'
      +'<div class="ex-stat"><div class="ex-stat-l">Load</div><div class="ex-stat-v">'+ex.load+'</div></div>'
      +'<div class="ex-stat"><div class="ex-stat-l">Reps</div><div class="ex-stat-v">'+ex.reps+'</div></div>'
      +'<div class="ex-stat"><div class="ex-stat-l">Tempo</div><div class="ex-stat-v">'+ex.tempo+'</div></div>'
      +'<div class="ex-stat"><div class="ex-stat-l">Rest</div><div class="ex-stat-v">'+ex.rest+'s</div></div>'
      +'</div>'
      +'<div class="ex-cues">'+ex.cues.map(function(c){return '<div class="ex-cue">'+c+'</div>';}).join('')+'</div>'
      +'<div class="ex-sets">';
    for(var s=1;s<=ex.sets;s++){
      var sk='kos3_str_'+dk+'_'+ex.id+'_s'+s;
      var sd=(function(k){try{return localStorage.getItem(k)==='1';}catch(e){return false;}})(sk);
      eh+='<div class="set-box'+(sd?' done':'')+'" onclick="lsToggleStr(this,\''+sk+'\')">'+s+'</div>';
    }
    eh+='</div>'
      +'<div class="rest-btn" onclick="startRest(this,'+ex.rest+')" id="rest-'+ex.id+'">'
      +'<div class="rest-fill" style="width:0%"></div>'
      +'<span style="position:relative;z-index:1">Start '+ex.rest+'s rest</span></div>';
    if(ex.subs&&ex.subs.length){
      eh+='<div class="ex-subs"><div class="ex-subs-title">Substitutions</div>';
      ex.subs.forEach(function(s){eh+='<div class="ex-sub"><strong style="color:var(--text)">'+s.n+'</strong> — '+s.d+'</div>';});
      eh+='</div>';
    }
    eh+='</div></div>';
  });
  document.getElementById('wo-exercises').innerHTML=eh;
}

function renderWOItems(containerId,items,prefix){
  var dk=todayStr();
  var c=document.getElementById(containerId);
  c.innerHTML='';
  items.forEach(function(item){
    var key='kos3_wo_'+prefix+'_'+dk+'_'+item.id;
    var done=(function(k){try{return localStorage.getItem(k)==='1';}catch(e){return false;}})(key);
    var el=document.createElement('div');
    el.className='wo-item'+(done?' done':'');
    el.innerHTML='<div class="check-box'+(done?' on-ember':'')+'"><span class="check-tick">✓</span></div>'
      +'<div class="wo-item-name">'+item.name
      +'<div class="check-sub">'+item.note+'</div></div>'
      +'<div class="wo-item-dur">'+item.dur+'</div>';
    el.onclick=function(){
      var now=(function(k){try{return localStorage.getItem(k)!=='1';}catch(e){return true;}})(key);
      try{localStorage.setItem(key,now?'1':'0');}catch(e){}
      el.classList.toggle('done',now);
      el.querySelector('.check-box').classList.toggle('on-ember',now);
    };
    c.appendChild(el);
  });
}

function lsToggleStr(el,key){
  el.classList.toggle('done');
  try{localStorage.setItem(key,el.classList.contains('done')?'1':'0');}catch(e){}
}

function startRest(btn,secs){
  var fill=btn.querySelector('.rest-fill');
  var label=btn.querySelector('span');
  if(btn._r){clearInterval(btn._r);btn._r=null;fill.style.width='0%';label.textContent='Start '+secs+'s rest';return;}
  var rem=secs;label.textContent=rem+'s';
  btn._r=setInterval(function(){
    rem--;fill.style.width=((secs-rem)/secs*100)+'%';label.textContent=rem+'s';
    if(rem<=0){clearInterval(btn._r);btn._r=null;fill.style.width='100%';label.textContent='Done ✓';
      setTimeout(function(){fill.style.width='0%';label.textContent='Start '+secs+'s rest';},2000);}
  },1000);
}

// ── INIT ─────────────────────────────────────────────────────────────────────

renderHeader();
updateClock();
setInterval(updateClock,1000);
renderVeraxus();
renderBody();
renderSpine();
</script>
</body>
</html>
